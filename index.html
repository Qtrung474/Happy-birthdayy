<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Lời Chúc Yêu Thương</title>
    <style>
        :root {
            --primary-color: #ff6b81;
            --bg-gradient: linear-gradient(135deg, #fceaf0 0%, #f9d1d1 100%);
        }

        body {
            margin: 0; padding: 0; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: var(--bg-gradient);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            flex-direction: column;
        }

        /* Hiệu ứng nến sinh nhật */
        .candle-container {
            cursor: pointer; transition: 0.5s;
            margin-bottom: 20px;
        }
        .flame {
            width: 20px; height: 30px; background: orange;
            margin: 0 auto; border-radius: 50% 50% 20% 20%;
            animation: flicker 0.1s infinite alternate;
            box-shadow: 0 0 20px orange;
        }
        @keyframes flicker {
            from { transform: scale(1); } to { transform: scale(1.1); }
        }
        .stick {
            width: 15px; height: 60px; background: #fff;
            border-bottom: 5px solid #ddd; margin: 0 auto;
        }

        /* Khung lời chúc */
        #message-box {
            background: white; padding: 40px;
            border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 450px; width: 90%; text-align: center;
            display: none; position: relative; z-index: 10;
        }

        #typing-text {
            font-size: 1.5rem; color: #333; min-height: 80px;
            line-height: 1.5; font-weight: bold;
        }

        /* Hiệu ứng trái tim */
        .heart {
            position: absolute; color: var(--primary-color);
            font-size: 20px; pointer-events: none;
            animation: flyUp 4s linear forwards;
        }
        @keyframes flyUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        .hidden { display: none; }
        .instruction { color: #888; margin-top: 10px; font-style: italic; }
    </style>
</head>
<body>

    <div id="candle-section" class="candle-container" onclick="startSurprise()">
        <div class="flame" id="flame"></div>
        <div class="stick"></div>
        <p class="instruction">Chạm vào nến để thổi và xem điều ước...</p>
    </div>

    <div id="message-box">
        <h1 style="color: var(--primary-color);">Happy Birthday! 🎂</h1>
        <div id="typing-text"></div>
        <p style="margin-top: 20px; font-size: 0.9rem; color: #ff6b81;">- Mãi luôn xinh đẹp và hạnh phúc nhé! -</p>
    </div>

    <audio id="hbdMusic">
        <source src="https://www.chosic.com/wp-content/uploads/2021/04/Happy-Birthday-Preview.mp3" type="audio/mpeg">
    </audio>

    <script>
        const textToType = "Chúc mừng sinh nhật ! Chúc nghi tuổi mới thật nhiều niềm vui, sức khỏe dồi dào và sớm đạt được mọi dự định nhé! ✨💖";
        let index = 0;

        function typeEffect() {
            if (index < textToType.length) {
                document.getElementById("typing-text").innerHTML += textToType.charAt(index);
                index++;
                setTimeout(typeEffect, 100); // Tốc độ gõ chữ
            }
        }

        function createHeart() {
            const heart = document.createElement("div");
            heart.innerHTML = "❤️";
            heart.classList.add("heart");
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.bottom = "-5vh";
            heart.style.fontSize = (Math.random() * 20 + 10) + "px";
            heart.style.animationDuration = (Math.random() * 2 + 3) + "s";
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 4000);
        }

        function startSurprise() {
            // Tắt nến
            document.getElementById('flame').style.display = 'none';
            document.getElementById('candle-section').style.opacity = '0';
            setTimeout(() => document.getElementById('candle-section').style.display = 'none', 500);

            // Hiện khung lời chúc
            const box = document.getElementById('message-box');
            box.style.display = 'block';
            
            // Phát nhạc
            document.getElementById('hbdMusic').play();

            // Chạy hiệu ứng
            setTimeout(typeEffect, 500);
            setInterval(createHeart, 300);
        }
    </script>
</body>
</html>
